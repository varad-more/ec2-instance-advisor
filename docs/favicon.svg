<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4338ca"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- Server row 1 — top pick (white, solid) -->
  <rect x="72" y="112" width="368" height="104" rx="22" fill="white"/>
  <!-- Row 1 status dot (gold = recommended) -->
  <circle cx="142" cy="164" r="26" fill="#fbbf24"/>
  <!-- Row 1 content lines -->
  <rect x="188" y="148" width="160" height="16" rx="8" fill="#e0e7ff"/>
  <rect x="188" y="178" width="100" height="12" rx="6" fill="#c7d2fe"/>
  <!-- Row 1 check badge (top-right) -->
  <circle cx="400" cy="142" r="22" fill="#10b981"/>
  <polyline points="389,142 397,151 413,133" fill="none" stroke="white" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Server row 2 (slightly muted) -->
  <rect x="72" y="234" width="368" height="104" rx="22" fill="white" opacity="0.82"/>
  <circle cx="142" cy="286" r="26" fill="#818cf8"/>
  <rect x="188" y="270" width="130" height="16" rx="8" fill="#e0e7ff"/>
  <rect x="188" y="300" width="80" height="12" rx="6" fill="#c7d2fe"/>

  <!-- Server row 3 (most muted) -->
  <rect x="72" y="356" width="368" height="88" rx="22" fill="white" opacity="0.55"/>
  <circle cx="142" cy="400" r="22" fill="#a5b4fc"/>
  <rect x="188" y="388" width="110" height="14" rx="7" fill="#e0e7ff"/>
  <rect x="188" y="410" width="70" height="10" rx="5" fill="#c7d2fe"/>
</svg>
