<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EC2 Instance Advisor</title>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <style>
    body { font-family: Inter, system-ui, Arial, sans-serif; margin: 24px; color: #111; }
    h1 { margin-bottom: 6px; }
    .muted { color: #666; margin-top: 0; }
    .grid { display: grid; grid-template-columns: 300px 1fr; gap: 18px; }
    .card { border: 1px solid #ddd; border-radius: 12px; padding: 14px; }
    label { font-size: 14px; display: block; margin: 8px 0 4px; }
    select, input[type='range'] { width: 100%; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { border-bottom: 1px solid #eee; padding: 8px; text-align: left; }
    .top { margin: 12px 0; padding: 10px; background: #f6f9ff; border: 1px solid #d9e7ff; border-radius: 10px; }
    .error { background: #fff4f4; border-color: #ffcaca; }
    ul { margin: 8px 0; padding-left: 18px; }
  </style>
</head>
<body>
  <h1>EC2 Instance Advisor</h1>
  <p class="muted">Filter by region and instance type (CPU/GPU/Memory/Storage/General), then tune weights.</p>

  <div class="grid">
    <div class="card">
      <label>Region</label>
      <select id="region"></select>

      <label>Instance type category</label>
      <select id="category"></select>

      <label>Price importance: <span id="wPriceVal">35</span>%</label>
      <input id="wPrice" type="range" min="0" max="100" value="35" />

      <label>CPU importance: <span id="wCpuVal">25</span>%</label>
      <input id="wCpu" type="range" min="0" max="100" value="25" />

      <label>Memory importance: <span id="wMemVal">20</span>%</label>
      <input id="wMem" type="range" min="0" max="100" value="20" />

      <label>Network importance: <span id="wNetVal">10</span>%</label>
      <input id="wNet" type="range" min="0" max="100" value="10" />

      <label>GPU importance: <span id="wGpuVal">10</span>%</label>
      <input id="wGpu" type="range" min="0" max="100" value="10" />
    </div>

    <div>
      <div id="best" class="top"></div>
      <div id="explain" class="top" style="background:#f9fff6;border-color:#d9f0cf"></div>
      <div id="types" class="top"></div>
      <div id="chart" class="card" style="min-height: 390px;"></div>
      <div class="card" style="margin-top: 12px;">
        <h3 style="margin-top:0;">Top Candidates</h3>
        <table id="table"></table>
      </div>
    </div>
  </div>

  <script>
    const csvUrl = './data/ec2_samples.csv';
    const state = { rows: [] };
    const sliders = ['wPrice','wCpu','wMem','wNet','wGpu'];
    const el = id => document.getElementById(id);

    const typeExplain = {
      CPU: 'Compute-optimized instances for CPU-heavy jobs like builds, encoding, game servers, and high-QPS APIs.',
      GPU: 'Accelerated instances for ML training/inference, rendering, and workloads that need CUDA/GPUs.',
      Memory: 'Memory-optimized instances for large caches, analytics, and in-memory databases.',
      Storage: 'Storage-optimized instances for high IOPS and low-latency local NVMe-intensive workloads.',
      General: 'Balanced instances for common web apps, microservices, and mixed workloads.'
    };

    function parseCSV(text) {
      const [header, ...lines] = text.trim().split('\n');
      const cols = header.split(',');
      return lines.filter(Boolean).map(line => {
        const vals = line.split(',');
        const obj = {};
        cols.forEach((c, i) => obj[c] = vals[i]);
        obj.vcpus = +obj.vcpus;
        obj.memory_gib = +obj.memory_gib;
        obj.network_score = +obj.network_score;
        obj.gpu_count = +obj.gpu_count;
        obj.price_usd_hour = +obj.price_usd_hour;
        return obj;
      });
    }

    function norm(values, reverse=false) {
      const min = Math.min(...values), max = Math.max(...values);
      if (max === min) return values.map(() => 1);
      return values.map(v => reverse ? 1 - ((v-min)/(max-min)) : (v-min)/(max-min));
    }

    function showError(msg) {
      el('best').classList.add('error');
      el('best').innerHTML = `<b>Error:</b> ${msg}`;
    }

    function explainWhy(best, rows) {
      const cheapest = rows.reduce((a,b)=> a.price_usd_hour < b.price_usd_hour ? a : b);
      const strongest = rows.reduce((a,b)=> (a.perf || 0) > (b.perf || 0) ? a : b);
      const priceDelta = ((best.price_usd_hour - cheapest.price_usd_hour)/Math.max(cheapest.price_usd_hour, 0.0001))*100;
      const perfGap = ((strongest.perf - best.perf)/Math.max(strongest.perf, 1))*100;
      return `<b>Best fit for:</b> ${typeExplain[best.instance_category] || best.instance_category}. ` +
             `<b>Cost position:</b> ${priceDelta <= 1 ? 'near-cheapest' : `${priceDelta.toFixed(1)}% above cheapest`} in this filter. ` +
             `<b>Performance position:</b> within ${Math.max(0, perfGap).toFixed(1)}% of the strongest candidate.`;
    }

    function renderTypeExplanations() {
      const lines = Object.entries(typeExplain).map(([k,v]) => `<li><b>${k}</b>: ${v}</li>`).join('');
      el('types').innerHTML = `<b>Instance type guide</b><ul>${lines}</ul>`;
    }

    function render() {
      sliders.forEach(s => el(s+'Val').textContent = el(s).value);
      const region = el('region').value;
      const category = el('category').value;

      let rows = state.rows.filter(r => (region === 'All' || r.region === region) && (category === 'All' || r.instance_category === category));
      if (!rows.length) {
        showError('No rows match selected filters.');
        el('table').innerHTML = '';
        return;
      }

      const w = {
        price: +el('wPrice').value,
        cpu: +el('wCpu').value,
        mem: +el('wMem').value,
        net: +el('wNet').value,
        gpu: +el('wGpu').value,
      };
      const sum = Object.values(w).reduce((a,b)=>a+b,0) || 1;

      const p = norm(rows.map(r=>r.price_usd_hour), true);
      const c = norm(rows.map(r=>r.vcpus));
      const m = norm(rows.map(r=>r.memory_gib));
      const n = norm(rows.map(r=>r.network_score));
      const g = norm(rows.map(r=>r.gpu_count));

      rows = rows.map((r, i) => {
        const perf = r.vcpus*0.35 + r.memory_gib*0.30 + r.network_score*0.20 + r.gpu_count*0.15;
        const composite = (w.price/sum)*p[i] + (w.cpu/sum)*c[i] + (w.mem/sum)*m[i] + (w.net/sum)*n[i] + (w.gpu/sum)*g[i];
        return { ...r, perf, composite };
      }).sort((a,b)=>b.composite-a.composite);

      const best = rows[0];
      el('best').classList.remove('error');
      el('best').innerHTML = `<b>Top recommendation:</b> ${best.instance_type} (${best.instance_category}, ${best.region}) — $${best.price_usd_hour.toFixed(4)}/hr, score ${best.composite.toFixed(3)}`;
      el('explain').innerHTML = explainWhy(best, rows);

      Plotly.newPlot('chart', [{
        x: rows.map(r=>r.price_usd_hour),
        y: rows.map(r=>r.perf),
        mode: 'markers+text',
        text: rows.map(r=>r.instance_type),
        textposition: 'top center',
        marker: { size: rows.map(r=>12 + r.composite*20), color: rows.map(r=>r.composite), colorscale: 'Blues' },
        hovertemplate: '%{text}<br>Category: %{customdata[0]}<br>Region: %{customdata[1]}<br>Price: $%{x}/hr<br>Perf: %{y:.2f}<extra></extra>',
        customdata: rows.map(r => [r.instance_category, r.region])
      }], {
        title: 'Price vs Performance',
        xaxis: { title: 'Price (USD/hr)' },
        yaxis: { title: 'Performance index' },
        margin: { t: 40 }
      }, {responsive:true});

      const head = `<tr><th>Instance</th><th>Category</th><th>Region</th><th>vCPU</th><th>Mem</th><th>GPU</th><th>Net</th><th>$/hr</th><th>Score</th></tr>`;
      const body = rows.slice(0,10).map(r =>
        `<tr><td>${r.instance_type}</td><td>${r.instance_category}</td><td>${r.region}</td><td>${r.vcpus}</td><td>${r.memory_gib}</td><td>${r.gpu_count}</td><td>${r.network_score}</td><td>${r.price_usd_hour.toFixed(4)}</td><td>${r.composite.toFixed(3)}</td></tr>`
      ).join('');
      el('table').innerHTML = head + body;
    }

    async function boot() {
      try {
        const resp = await fetch(csvUrl, { cache: 'no-store' });
        if (!resp.ok) throw new Error(`Failed to load dataset (${resp.status}).`);
        const txt = await resp.text();
        state.rows = parseCSV(txt);

        const regions = ['All', ...new Set(state.rows.map(r=>r.region))];
        const categories = ['All', ...new Set(state.rows.map(r=>r.instance_category))];

        el('region').innerHTML = regions.map(v=>`<option>${v}</option>`).join('');
        el('category').innerHTML = categories.map(v=>`<option>${v}</option>`).join('');

        ['region','category',...sliders].forEach(id => el(id).addEventListener('input', render));
        renderTypeExplanations();
        render();
      } catch (e) {
        showError(e.message || 'Unknown error while starting app.');
      }
    }

    boot();
  </script>
</body>
</html>
